<!DOCTYPE html>
<html lang="en">

<!-- ─── Open Graph ────────────────────────────────────── -->
<meta property="og:type" content="website">
<meta property="og:title" content="Page Not Found | Plentiful Health & Wellness">
<meta property="og:description" content="The page you're looking for doesn't exist. Return to Plentiful Health & Wellness.">
<meta property="og:image" content="https://www.plentifulhealthok.com/images/plenti+ful+-+edit.webp">
<meta property="og:site_name" content="Plentiful Health & Wellness">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  .not-found {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 40px;
    position: relative;
    overflow: hidden;
    background: var(--cream);
  }

  .nf-bg-number {
    position: absolute;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(280px, 32vw, 480px);
    color: var(--cream-dark);
    line-height: 1;
    user-select: none;
    pointer-events: none;
    letter-spacing: -0.04em;
    opacity: 0;
    animation: fadeIn 1s ease 0.1s forwards;
  }

  .nf-content {
    position: relative;
    z-index: 2;
    max-width: 540px;
  }

  .nf-eyebrow {
    font-size: 10px;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.3s forwards;
  }

  .nf-headline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(42px, 5vw, 72px);
    line-height: 1.1;
    color: var(--ink);
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.45s forwards;
  }
  .nf-headline em { font-style: italic; color: var(--warm-brown); }

  .nf-body {
    font-weight: 400;
    font-size: 16px;
    line-height: 1.85;
    color: var(--ink-soft);
    margin-bottom: 52px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.6s forwards;
  }

  .nf-actions {
    display: flex;
    gap: 20px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.75s forwards;
  }

  .nf-logo {
    position: absolute;
    top: 36px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    text-decoration: none;
    opacity: 0;
    animation: fadeIn 0.6s ease 0.1s forwards;
    white-space: nowrap;
  }

  .nf-deco-line {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(to right, transparent, var(--warm-brown), var(--gold), var(--warm-brown), transparent);
    opacity: 0;
    animation: fadeIn 1s ease 1s forwards;
  }
</style>
</head>
<body>

<!-- Skip Navigation -->
<a href="#main-content" class="skip-link">Skip to main content</a>

<main id="main-content">
  <div class="not-found" role="main">

    <a href="index.html" class="nf-logo" aria-label="Plentiful Health and Wellness — return to home page">
      <img src="images/plenti+ful+-+edit.webp" alt="Plentiful Health and Wellness" class="nav-logo-img" style="height:60px;">
    </a>

    <p class="nf-bg-number" aria-hidden="true">404</p>

    <div class="nf-content">
      <p class="nf-eyebrow" aria-hidden="true">Page Not Found</p>
      <h1 class="nf-headline">This page has<br><em>wandered off.</em></h1>
      <p class="nf-body">
        It looks like the page you're looking for doesn't exist or may have moved. Let's get you back on the path to your healthiest life.
      </p>
      <nav class="nf-actions" aria-label="Error page navigation">
        <a href="index.html" class="btn-primary">Back to Home <span aria-hidden="true">→</span></a>
        <a href="contact.html" class="btn-secondary">Contact Us</a>
      </nav>
    </div>

    <div class="nf-deco-line" aria-hidden="true"></div>
  </div>
</main>

</body>
</html>
